name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Bring up a real Postgres alongside the job so integration tests have
    # a database to point at. GitHub Actions exposes the service on localhost
    # via the mapped port.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: credflow
          POSTGRES_PASSWORD: credflow_dev
          POSTGRES_DB: credflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U credflow -d credflow_test"
          --health-interval=2s
          --health-timeout=2s
          --health-retries=15

    env:
      TEST_DATABASE_URL: postgres://credflow:credflow_dev@localhost:5432/credflow_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags=integration -count=1 ./test/integration/...
